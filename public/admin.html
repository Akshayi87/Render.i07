<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshu Admin - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f23; color: #fff; min-height: 100vh; }
        .sidebar {
            width: 260px;
            height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
            border-right: 1px solid #2a2a4a;
            overflow-y: auto;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }
        .nav-item {
            display: block;
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 10px;
            color: #a0aec0;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(102, 126, 234, 0.2);
            color: #fff;
        }
        .nav-item i { margin-right: 10px; width: 20px; }
        .main-content {
            margin-left: 260px;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 28px; font-weight: 700; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #2a2a4a;
        }
        .stat-card .icon {
            width: 50px; height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .stat-card h3 { font-size: 32px; font-weight: 700; margin-bottom: 5px; }
        .stat-card p { color: #a0aec0; font-size: 14px; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-danger {
            background: linear-gradient(135deg, #fc466b 0%, #3f5efb 100%);
            color: white;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a2e;
            border-radius: 15px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
        }
        th {
            background: rgba(102, 126, 234, 0.2);
            font-weight: 600;
            color: #667eea;
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-active { background: rgba(17, 153, 142, 0.2); color: #38ef7d; }
        .status-expired { background: rgba(252, 70, 107, 0.2); color: #fc466b; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #a0aec0;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            background: #0f0f23;
            color: #fff;
            font-size: 14px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #2a2a4a;
        }
        .key-display {
            background: #0f0f23;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 16px;
            color: #38ef7d;
            margin: 15px 0;
            word-break: break-all;
        }
        .login-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0f0f23;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #2a2a4a;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .login-box h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            background: #0f0f23;
            color: #fff;
            font-size: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
        .error { color: #fc466b; margin-top: 10px; }
        .success { color: #38ef7d; margin-top: 10px; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: relative; height: auto; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h1>AKSHU ADMIN</h1>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" value="akshu" required>
                <input type="password" id="password" placeholder="Password" value="akshu123" required>
                <button type="submit">Login</button>
                <p id="loginError" class="error"></p>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" style="display:none;">
        <div class="sidebar">
            <div class="logo">AKSHU ADMIN</div>
            <a class="nav-item active" onclick="showPage('dashboard')">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
            <a class="nav-item" onclick="showPage('keys')">
                <i class="fas fa-key"></i> API Keys
            </a>
            <a class="nav-item" onclick="showPage('scripts')">
                <i class="fas fa-code"></i> Lua Scripts
            </a>
            <a class="nav-item" onclick="showPage('logs')">
                <i class="fas fa-history"></i> Logs
            </a>
            <a class="nav-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>

        <div class="main-content" id="mainContent">
            <!-- Content loaded dynamically -->
        </div>
    </div>

    <!-- Create Key Modal -->
    <div id="createKeyModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Generate New API Key</h2>
            <form id="createKeyForm">
                <div class="form-group">
                    <label>Key Name</label>
                    <input type="text" id="keyName" placeholder="e.g., Premium User 1" required>
                </div>
                <div class="form-group">
                    <label>Expires At (optional)</label>
                    <input type="datetime-local" id="keyExpires">
                </div>
                <div class="form-group">
                    <label>Max Uses (optional)</label>
                    <input type="number" id="keyMaxUses" placeholder="Unlimited if empty">
                </div>
                <button type="submit" class="btn btn-primary">Generate Key</button>
                <button type="button" class="btn btn-danger" onclick="closeModal('createKeyModal')" style="margin-left: 10px;">Cancel</button>
            </form>
            <div id="newKeyDisplay" style="display:none; margin-top: 20px;">
                <p style="color: #38ef7d; margin-bottom: 10px;">✅ Key Generated Successfully!</p>
                <div class="key-display" id="generatedKey"></div>
                <button class="btn btn-success" onclick="copyKey()">Copy Key</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let sessionId = localStorage.getItem('akshu_session');
        let currentPage = 'dashboard';

        // Check session on load
        if (sessionId) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            showPage('dashboard');
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    sessionId = data.sessionId;
                    localStorage.setItem('akshu_session', sessionId);
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    showPage('dashboard');
                } else {
                    document.getElementById('loginError').textContent = data.message;
                }
            } catch (err) {
                document.getElementById('loginError').textContent = 'Server error. Try again.';
            }
        });

        // Logout
        async function logout() {
            await fetch(`${API_BASE}/admin/logout`, {
                method: 'POST',
                headers: { 'X-Session-Id': sessionId }
            });
            localStorage.removeItem('akshu_session');
            sessionId = null;
            location.reload();
        }

        // Navigation
        function showPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event?.target?.classList.add('active');

            switch(page) {
                case 'dashboard': loadDashboard(); break;
                case 'keys': loadKeys(); break;
                case 'scripts': loadScripts(); break;
                case 'logs': loadLogs(); break;
            }
        }

        // Dashboard
        async function loadDashboard() {
            const res = await fetch(`${API_BASE}/admin/stats`, {
                headers: { 'X-Session-Id': sessionId }
            });
            const data = await res.json();
            const stats = data.data;

            document.getElementById('mainContent').innerHTML = `
                <div class="header">
                    <h1>Dashboard</h1>
                    <span style="color: #a0aec0;">Welcome back, Admin!</span>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="icon" style="background: rgba(102, 126, 234, 0.2); color: #667eea;">
                            <i class="fas fa-key"></i>
                        </div>
                        <h3>${stats.totalKeys}</h3>
                        <p>Total API Keys</p>
                    </div>
                    <div class="stat-card">
                        <div class="icon" style="background: rgba(17, 153, 142, 0.2); color: #38ef7d;">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <h3>${stats.activeKeys}</h3>
                        <p>Active Keys</p>
                    </div>
                    <div class="stat-card">
                        <div class="icon" style="background: rgba(250, 112, 154, 0.2); color: #fa709a;">
                            <i class="fas fa-bolt"></i>
                        </div>
                        <h3>${stats.totalRequests}</h3>
                        <p>Total Requests</p>
                    </div>
                    <div class="stat-card">
                        <div class="icon" style="background: rgba(254, 225, 64, 0.2); color: #fee140;">
                            <i class="fas fa-calendar-day"></i>
                        </div>
                        <h3>${stats.todayRequests}</h3>
                        <p>Today's Requests</p>
                    </div>
                </div>
                <div style="background: #1a1a2e; padding: 25px; border-radius: 15px; border: 1px solid #2a2a4a;">
                    <h2 style="margin-bottom: 15px;">Quick Actions</h2>
                    <button class="btn btn-primary" onclick="showModal('createKeyModal')">Generate New Key</button>
                    <button class="btn btn-success" onclick="showPage('scripts')" style="margin-left: 10px;">Upload Script</button>
                </div>
            `;
        }

        // API Keys
        async function loadKeys() {
            const res = await fetch(`${API_BASE}/admin/keys`, {
                headers: { 'X-Session-Id': sessionId }
            });
            const data = await res.json();
            const keys = data.data;

            let html = `
                <div class="header">
                    <h1>API Keys</h1>
                    <button class="btn btn-primary" onclick="showModal('createKeyModal')">Generate New Key</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Key Name</th>
                            <th>API Key</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Expires</th>
                            <th>Uses</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            keys.forEach(key => {
                html += `
                    <tr>
                        <td>${key.key_name}</td>
                        <td>${key.api_key.substring(0, 20)}...</td>
                        <td><span class="status-badge status-${key.status}">${key.status}</span></td>
                        <td>${new Date(key.created_at).toLocaleDateString()}</td>
                        <td>${key.expires_at ? new Date(key.expires_at).toLocaleDateString() : 'Never'}</td>
                        <td>${key.usage_count}</td>
                        <td>
                            <button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteKey(${key.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            document.getElementById('mainContent').innerHTML = html;
        }

        // Create Key
        document.getElementById('createKeyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keyName = document.getElementById('keyName').value;
            const expires = document.getElementById('keyExpires').value;
            const maxUses = document.getElementById('keyMaxUses').value;

            const res = await fetch(`${API_BASE}/admin/keys`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Session-Id': sessionId 
                },
                body: JSON.stringify({ key_name: keyName, expires_at: expires, max_uses: maxUses })
            });
            const data = await res.json();

            if (data.status === 'success') {
                document.getElementById('generatedKey').textContent = data.data.api_key;
                document.getElementById('newKeyDisplay').style.display = 'block';
                document.getElementById('createKeyForm').style.display = 'none';
            }
        });

        function copyKey() {
            const key = document.getElementById('generatedKey').textContent;
            navigator.clipboard.writeText(key);
            alert('Key copied to clipboard!');
        }

        async function deleteKey(id) {
            if (!confirm('Delete this key?')) return;
            await fetch(`${API_BASE}/admin/keys/${id}`, {
                method: 'DELETE',
                headers: { 'X-Session-Id': sessionId }
            });
            loadKeys();
        }

        // Scripts
        async function loadScripts() {
            const res = await fetch(`${API_BASE}/admin/scripts`, {
                headers: { 'X-Session-Id': sessionId }
            });
            const data = await res.json();
            const scripts = data.data;

            let html = `
                <div class="header">
                    <h1>Lua Scripts</h1>
                </div>
                <div style="background: #1a1a2e; padding: 25px; border-radius: 15px; margin-bottom: 20px;">
                    <h3 style="margin-bottom: 15px;">Upload New Script</h3>
                    <form id="uploadForm" enctype="multipart/form-data">
                        <input type="file" name="script" accept=".lua" style="margin-bottom: 15px; color: #fff;">
                        <button type="submit" class="btn btn-success">Upload Script</button>
                    </form>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Script Name</th>
                            <th>Size</th>
                            <th>Uploaded</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            scripts.forEach(script => {
                html += `
                    <tr>
                        <td>${script.name}</td>
                        <td>${(script.size / 1024).toFixed(2)} KB</td>
                        <td>${new Date(script.created_at).toLocaleString()}</td>
                        <td>
                            <button class="btn btn-primary" style="padding: 5px 10px; font-size: 12px;" onclick="viewScript('${script.filename}')">View</button>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            document.getElementById('mainContent').innerHTML = html;

            document.getElementById('uploadForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                await fetch(`${API_BASE}/admin/scripts`, {
                    method: 'POST',
                    headers: { 'X-Session-Id': sessionId },
                    body: formData
                });
                loadScripts();
            });
        }

        function viewScript(filename) {
            window.open(`${API_BASE}/lua_scripts/${filename}`, '_blank');
        }

        // Logs
        async function loadLogs() {
            const res = await fetch(`${API_BASE}/admin/logs`, {
                headers: { 'X-Session-Id': sessionId }
            });
            const data = await res.json();
            const logs = data.data;

            let html = `
                <div class="header">
                    <h1>API Logs</h1>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>IP Address</th>
                            <th>API Key</th>
                            <th>Action</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            logs.forEach(log => {
                html += `
                    <tr>
                        <td>${new Date(log.created_at).toLocaleString()}</td>
                        <td>${log.ip_address}</td>
                        <td>${log.api_key ? log.api_key.substring(0, 20) + '...' : 'N/A'}</td>
                        <td>${log.action || 'N/A'}</td>
                        <td><span class="status-badge status-${log.status}">${log.status}</span></td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            document.getElementById('mainContent').innerHTML = html;
        }

        // Modal functions
        function showModal(id) {
            document.getElementById(id).style.display = 'flex';
            // Reset form
            if (id === 'createKeyModal') {
                document.getElementById('createKeyForm').style.display = 'block';
                document.getElementById('newKeyDisplay').style.display = 'none';
                document.getElementById('createKeyForm').reset();
            }
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Close modal on outside click
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
